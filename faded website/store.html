<!DOCTYPE html>
<html>
<head>
    <title>FADED Store</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f4f4;
            margin:0;
        }

        header{
            background:black;
            color:white;
            text-align:center;
            padding:20px;
        }

        .products{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:20px;
        }

        .product{
            background:white;
            width:300px;
            border-radius:10px;
            padding:15px;
            text-align:center;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .product img{
            width:100%;
            height:300px;
            object-fit:cover;
            border-radius:10px;
        }

        select{
            width:100%;
            padding:8px;
            margin-top:10px;
        }

        button{
            margin-top:10px;
            width:100%;
            padding:10px;
            background:black;
            color:white;
            border:none;
            cursor:pointer;
        }

    </style>

</head>
<body>

<header>
    <h1>FADED CLOTHING STORE</h1>
</header>

<div class="products">

    <div class="product">
        <img src="nike hoodei.jpg" alt="nike hoodie">

        <h3>Nike Hoodie</h3>

        <select>
            <option>Select Size</option>
            <option>Small (S)</option>
            <option>Medium (M)</option>
            <option>Large (L)</option>
            <option>XL</option>
        </select>

        <button>Add To Cart</button>
    </div>

    <div class="product">
        <img src="adidas T-shirt.jpg" alt="adidas T-Shirt">

        <h3>Adidas T-Shirt</h3>

        <select>
            <option>Select Size</option>
            <option>Small (S)</option>
            <option>Medium (M)</option>
            <option>Large (L)</option>
            <option>XL</option>
        </select>

        <button>Add To Cart</button>
    </div>

    <div class="product">
        <img src="puma jacket.jpg" alt="Puma jacket">

        <h3>Puma Jacket</h3>

        <select>
            <option>Select Size</option>
            <option>Small (S)</option>
            <option>Medium (M)</option>
            <option>Large (L)</option>
            <option>XL</option>
        </select>

        <button>Add To Cart</button>
    </div>

</div>

</body>
</html>

 </html>
